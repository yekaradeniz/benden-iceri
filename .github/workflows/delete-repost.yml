name: Delete & Repost Today

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-repost:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Delete most recent Instagram post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          node --input-type=module << 'EOF'
          const userId = process.env.IG_USER_ID;
          const token = process.env.IG_ACCESS_TOKEN;
          const base = 'https://graph.facebook.com/v21.0';

          // Get most recent media
          const listUrl = `${base}/${userId}/media?fields=id,timestamp&limit=1&access_token=${token}`;
          const listRes = await fetch(listUrl);
          const list = await listRes.json();

          if (!list.data || list.data.length === 0) {
            console.log('Silinecek post bulunamadı.');
            process.exit(0);
          }

          const mediaId = list.data[0].id;
          console.log('Siliniyor:', mediaId, list.data[0].timestamp);

          const delUrl = `${base}/${mediaId}?access_token=${token}`;
          const delRes = await fetch(delUrl, { method: 'DELETE' });
          const delJson = await delRes.json();
          console.log('Silme sonucu:', JSON.stringify(delJson));
          EOF

      - name: Re-render today's PNG
        run: npm run render
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit new PNG
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add output/
          if git diff --staged --quiet; then
            echo "Değişiklik yok"
          else
            git commit -m "chore: repost $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Wait for raw URL
        run: sleep 10

      - name: Post to Instagram
        run: npm run post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit post result (postId)
        run: |
          git add output/log.json
          if git diff --staged --quiet; then
            echo "log.json degismedi"
          else
            git commit -m "chore: repost sonucu kaydet $(date -u +%Y-%m-%d)"
            git push
          fi

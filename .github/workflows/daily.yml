name: Daily Post

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 12:00 GMT+3. Gunde tek post (carousel/reel alternating)
  workflow_dispatch:      # manual trigger button

permissions:
  contents: write         # needed to commit output PNG and log.json back

concurrency:
  group: daily-post
  cancel-in-progress: false  # ikinci run beklesin, iptal edilmesin

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Random jitter (0-30 dk) - sadece schedule icin, bot pattern bozma
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Random delay: ${DELAY}s ($((DELAY/60)) dk)"
          sleep $DELAY

      - name: Generate today's media (carousel veya reel)
        run: npm run render
        timeout-minutes: 8
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit and push generated PNG + state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase true
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily post $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" 2>/dev/null || true
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "Push başarılı (deneme $i)"
                break
              fi
              echo "Push başarısız (deneme $i), tekrar deneniyor..."
              sleep 3
            done
          fi

      - name: Wait for raw URL availability
        run: sleep 10

      - name: Post to Instagram
        run: npm run post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit post result (postId)
        run: |
          git add output/log.json
          if git diff --staged --quiet; then
            echo "log.json degismedi"
          else
            git commit -m "chore: post sonucu kaydet $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" 2>/dev/null || true
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "Push başarılı (deneme $i)"
                break
              fi
              echo "Push başarısız (deneme $i), tekrar deneniyor..."
              sleep 3
            done
          fi

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
  .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.00) 0%,
      rgba(0,0,0,0.00) 35%,
      rgba(0,0,0,0.38) 50%,
      rgba(0,0,0,0.82) 100%);
  }
</style>
</head>
<body>
  <div class="gradient"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>benden içeri — mânâ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: #0f0e0b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 110px 110px;
  }
  .header {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 11px;
    text-transform: uppercase;
    color: #d9c79a;
    opacity: 0.65;
    margin-bottom: 52px;
    text-align: center;
  }
  .divider {
    width: 90px;
    height: 2px;
    background: rgba(217, 199, 154, 0.35);
    margin: 0 auto 72px;
  }
  .explanation {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 36px;
    line-height: 1.72;
    color: #e4dcc8;
    text-align: center;
    white-space: pre-line;
    flex: 1;
  }
  .footer-divider {
    width: 90px;
    height: 2px;
    background: rgba(217, 199, 154, 0.35);
    margin: 64px auto 36px;
  }
  .footer {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 24px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #d9c79a;
    opacity: 0.65;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="header">Mânâ</div>
  <div class="divider"></div>
  <div class="explanation">{{explanation}}</div>
  <div class="footer-divider"></div>
  <div class="footer">Salih Baba</div>
</body>
</html>
